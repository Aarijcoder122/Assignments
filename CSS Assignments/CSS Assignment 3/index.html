<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="loginbox">
        <h1>Login Form</h1>
        <div class="displayflexclass">
            <input type="email" class="emailinput" placeholder="Email">
            <input type="password" class="passwordinput" placeholder="Password">
        </div>
        <div class="displayflexclass2">
            <input type="checkbox" class="checkbox">
            <p>Remember Me?</p>
            <p class="forgotpassword">Forgot Password?</p>
        </div>
        <button class="loginbutton">Login</button>
    </div>
</body>

</html>
